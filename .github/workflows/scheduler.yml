name: Cortex Alarm Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      CEREBRAS_API_KEYS:    ${{ secrets.CEREBRAS_API_KEYS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install scheduler dependencies
        run: cd scheduler && npm install

      - name: Run scheduler
        run: node scheduler/index.js
