<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cortex Alarm — Inbox</title>
<link rel="stylesheet" href="/CortexAlarm/css/style.css"/>
<link rel="manifest" href="/CortexAlarm/manifest.json"/>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-brand"><h1>◈ Cortex Alarm</h1><p>ND1 CS — Study System</p></div>
    <div id="sidebar-nav"></div>
  </nav>
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
          <h2>Inbox</h2>
          <p>All AI-generated study notifications. Resets every Monday.</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <select id="filter" class="form-select" style="width:auto;padding:8px 12px;">
            <option value="">All</option>
            <option value="morning">Morning</option>
            <option value="afternoon">Post-Lecture</option>
            <option value="evening">Evening</option>
            <option value="weekend">Weekend</option>
          </select>
          <button class="btn btn-ghost btn-sm" id="mark-all-read">Mark All Read</button>
        </div>
      </div>
    </div>
    <div id="notif-list"><div class="loading"><span class="spinner"></span>Loading…</div></div>
  </main>
</div>
<nav class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav"></div></nav>
<script src="/CortexAlarm/js/supabase-client.js"></script>
<script src="/CortexAlarm/js/utils.js"></script>
<script>
utils.buildNav('notifications');
let allNotifs = [];
let currentFilter = '';

async function loadNotifs() {
  const list = document.getElementById('notif-list');
  try {
    allNotifs = await sb.select('notifications', 'order=sent_at.desc&limit=200') || [];
    renderNotifs();
  } catch(err) {
    list.innerHTML = `<div class="empty"><p>Error: ${err.message}</p></div>`;
  }
}

function renderNotifs() {
  const list = document.getElementById('notif-list');
  const shown = currentFilter ? allNotifs.filter(n => n.type === currentFilter) : allNotifs;
  if (!shown.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">◉</div><p>No notifications yet. The scheduler runs every 5 minutes.</p></div>';
    return;
  }
  list.innerHTML = shown.map(n => `
    <div class="notif-item ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}', this)">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div class="notif-title">${n.title}</div>
        ${!n.read ? '<span class="badge badge-blue" style="flex-shrink:0">New</span>' : ''}
      </div>
      <div class="notif-body">${n.body}</div>
      <div class="notif-meta">
        <span class="badge badge-${n.type==='morning'?'blue':n.type==='afternoon'?'green':n.type==='weekend'?'yellow':'purple'}">${n.type}</span>
        ${n.ai_generated ? '<span class="badge badge-purple">AI</span>' : ''}
        <span>${utils.fmtTime(n.sent_at)}</span>
      </div>
    </div>`).join('');
}

async function markRead(id, el) {
  try {
    await sb.update('notifications', `id=eq.${id}`, { read: true });
    el.classList.remove('unread');
    el.querySelector('.badge-blue')?.remove();
    const i = allNotifs.findIndex(n => n.id === id);
    if (i !== -1) allNotifs[i].read = true;
  } catch(err) { console.error(err); }
}

document.getElementById('filter').addEventListener('change', e => {
  currentFilter = e.target.value;
  renderNotifs();
});

document.getElementById('mark-all-read').addEventListener('click', async () => {
  try {
    await sb.update('notifications', 'read=eq.false', { read: true });
    allNotifs.forEach(n => n.read = true);
    renderNotifs();
    utils.toast('All marked as read');
  } catch(err) { utils.toast(err.message, 'error'); }
});

loadNotifs();
</script>
</body>
</html>
