<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cortex Alarm — Timetable</title>
<link rel="stylesheet" href="/CortexAlarm/public/css/style.css"/>
<link rel="manifest" href="/CortexAlarm/public/manifest.json"/>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-brand"><h1>◈ Cortex Alarm</h1><p>ND1 CS — Study System</p></div>
    <div id="sidebar-nav"></div>
  </nav>
  <main class="main-content">
    <div class="page-header">
      <h2>Timetable</h2>
      <p>ND1 Computer Science — 2nd Semester Schedule</p>
    </div>
    <div id="timetable"></div>
  </main>
</div>
<nav class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav"></div></nav>
<script src="/CortexAlarm/public/js/supabase-client.js"></script>
<script src="/CortexAlarm/public/js/utils.js"></script>
<script>
utils.buildNav('timetable');

const todayName = new Intl.DateTimeFormat('en-GB',{ timeZone:'Africa/Lagos', weekday:'long' }).format(new Date());

const el = document.getElementById('timetable');
el.innerHTML = utils.ND1_TIMETABLE.map(d => {
  const isToday = d.day === todayName;
  return `<div class="day-block">
    <div class="day-header">
      <div class="day-name ${isToday ? 'today' : ''}">${d.day}${isToday ? ' · Today' : ''}</div>
      <span class="badge ${d.lectures.length ? 'badge-blue' : 'badge-red'}">${d.lectures.length ? d.lectures.length + ' lectures' : 'No lectures'}</span>
    </div>
    ${d.lectures.length
      ? d.lectures.map(l => `<div class="lecture-row">
          <div class="lecture-time">${l.startTime}–${l.endTime}</div>
          <div>
            <div class="lecture-code">${l.code}</div>
            <div class="lecture-sub">${l.subject}</div>
          </div>
        </div>`).join('')
      : `<div class="lecture-row" style="color:var(--text3);font-size:0.82rem;">Weekend — No scheduled lectures</div>`
    }
  </div>`;
}).join('');
</script>
</body>
</html>
