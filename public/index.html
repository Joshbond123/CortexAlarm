<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cortex Alarm — Dashboard</title>
<link rel="stylesheet" href="/CortexAlarm/public/css/style.css"/>
<link rel="manifest" href="/CortexAlarm/public/manifest.json"/>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-brand">
      <h1>◈ Cortex Alarm</h1>
      <p>ND1 CS — Study System</p>
    </div>
    <div id="sidebar-nav"></div>
  </nav>

  <main class="main-content">
    <div class="page-header">
      <h2>Dashboard</h2>
      <p id="today-label">Loading…</p>
    </div>

    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-notifs">—</div><div class="stat-label">Total Notifications</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-unread">—</div><div class="stat-label">Unread</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-keys">—</div><div class="stat-label">API Keys</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-devices">—</div><div class="stat-label">Subscribed Devices</div></div>
    </div>

    <!-- Today's Schedule -->
    <div class="section">
      <div class="section-title">Today's Schedule</div>
      <div id="today-schedule" class="card"><div class="loading"><span class="spinner"></span>Loading…</div></div>
    </div>

    <!-- Recent Notifications -->
    <div class="section">
      <div class="section-title">Recent Notifications</div>
      <div id="recent-notifs"><div class="loading"><span class="spinner"></span>Loading…</div></div>
    </div>

    <!-- System Status -->
    <div class="section">
      <div class="section-title">System Status</div>
      <div class="card">
        <div id="sys-status"><div class="loading"><span class="spinner"></span>Loading…</div></div>
      </div>
    </div>
  </main>
</div>

<nav class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav"></div></nav>

<script src="/CortexAlarm/public/js/supabase-client.js"></script>
<script src="/CortexAlarm/public/js/utils.js"></script>
<script>
utils.buildNav('index');

// Today label
const today = new Intl.DateTimeFormat('en-GB',{ timeZone:'Africa/Lagos', weekday:'long', day:'numeric', month:'long' }).format(new Date());
document.getElementById('today-label').textContent = today;

// Today's schedule
const sched = utils.getTodaySchedule();
const schedEl = document.getElementById('today-schedule');
if (!sched.lectures.length) {
  schedEl.innerHTML = `<div class="empty"><div class="empty-icon">◷</div><p>${sched.day} — No lectures scheduled. Focus on revision.</p></div>`;
} else {
  schedEl.innerHTML = sched.lectures.map(l => `
    <div class="lecture-row">
      <div class="lecture-time">${l.startTime}–${l.endTime}</div>
      <div><div class="lecture-code">${l.code}</div><div class="lecture-sub">${l.subject}</div></div>
    </div>`).join('');
}

// Load stats
async function loadDash() {
  try {
    const [notifs, keys, devs, settings] = await Promise.all([
      sb.select('notifications', 'select=id,read'),
      sb.select('api_keys', 'select=id,active'),
      sb.select('subscribers', 'active=eq.true&select=id'),
      sb.select('settings', 'id=eq.1'),
    ]);
    const n = notifs || [];
    document.getElementById('stat-notifs').textContent  = n.length;
    document.getElementById('stat-unread').textContent  = n.filter(x=>!x.read).length;
    document.getElementById('stat-keys').textContent    = (keys||[]).filter(k=>k.active).length;
    document.getElementById('stat-devices').textContent = (devs||[]).length;

    // System status
    const s = settings?.[0];
    document.getElementById('sys-status').innerHTML = `
      <div class="toggle-row">
        <div class="toggle-info"><h4>AI Generation</h4><p>Cerebras gpt-oss-120b</p></div>
        <span class="badge ${s?.ai_enabled ? 'badge-green' : 'badge-red'}">${s?.ai_enabled ? 'Enabled' : 'Disabled'}</span>
      </div>
      <div class="toggle-row">
        <div class="toggle-info"><h4>Notifications</h4><p>Push alerts</p></div>
        <span class="badge ${s?.notifications_enabled ? 'badge-green' : 'badge-red'}">${s?.notifications_enabled ? 'Enabled' : 'Disabled'}</span>
      </div>
      <div class="toggle-row" style="border:none">
        <div class="toggle-info"><h4>Schedule</h4><p>Every 5 minutes via GitHub Actions</p></div>
        <span class="badge badge-blue">Running</span>
      </div>`;
  } catch(err) {
    console.error(err);
  }
}

// Recent notifications
async function loadRecent() {
  try {
    const notifs = await sb.select('notifications', 'order=sent_at.desc&limit=5');
    const el = document.getElementById('recent-notifs');
    if (!notifs?.length) {
      el.innerHTML = '<div class="empty"><div class="empty-icon">◉</div><p>No notifications yet.</p></div>';
      return;
    }
    el.innerHTML = notifs.map(n => `
      <div class="notif-item ${n.read ? '' : 'unread'}">
        <div class="notif-title">${n.title}</div>
        <div class="notif-body">${n.body}</div>
        <div class="notif-meta">
          <span class="badge badge-${n.type === 'morning' ? 'blue' : n.type === 'evening' ? 'purple' : n.type === 'weekend' ? 'yellow' : 'green'}">${n.type}</span>
          ${n.ai_generated ? '<span class="badge badge-purple">AI</span>' : ''}
          <span>${utils.timeAgo(n.sent_at)}</span>
        </div>
      </div>`).join('');
  } catch(err) { console.error(err); }
}

loadDash();
loadRecent();
</script>
</body>
</html>
