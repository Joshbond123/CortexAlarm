<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cortex Alarm — Logs</title>
<link rel="stylesheet" href="/CortexAlarm/public/css/style.css"/>
<link rel="manifest" href="/CortexAlarm/public/manifest.json"/>
</head>
<body>
<div class="app-layout">
  <nav class="sidebar">
    <div class="sidebar-brand"><h1>◈ Cortex Alarm</h1><p>ND1 CS — Study System</p></div>
    <div id="sidebar-nav"></div>
  </nav>
  <main class="main-content">
    <div class="page-header">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">
        <div>
          <h2>System Logs</h2>
          <p>Scheduler activity from GitHub Actions. Last 30 days kept.</p>
        </div>
        <div style="display:flex;gap:8px;">
          <select id="level-filter" class="form-select" style="width:auto;padding:8px 12px;">
            <option value="">All Levels</option>
            <option value="success">Success</option>
            <option value="info">Info</option>
            <option value="error">Error</option>
          </select>
          <button class="btn btn-ghost btn-sm" onclick="loadLogs()">Refresh</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div id="log-list"><div class="loading"><span class="spinner"></span>Loading…</div></div>
    </div>
  </main>
</div>
<nav class="bottom-nav"><div class="bottom-nav-inner" id="bottom-nav"></div></nav>
<script src="/CortexAlarm/public/js/supabase-client.js"></script>
<script src="/CortexAlarm/public/js/utils.js"></script>
<script>
utils.buildNav('logs');
let allLogs = [];

async function loadLogs() {
  const list = document.getElementById('log-list');
  list.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  try {
    allLogs = await sb.select('logs', 'order=created_at.desc&limit=200') || [];
    renderLogs();
  } catch(err) {
    list.innerHTML = `<div class="empty"><p>Error: ${err.message}</p></div>`;
  }
}

function renderLogs() {
  const filter = document.getElementById('level-filter').value;
  const shown  = filter ? allLogs.filter(l => l.level === filter) : allLogs;
  const list   = document.getElementById('log-list');
  if (!shown.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">◈</div><p>No logs yet. Scheduler runs every 5 minutes.</p></div>';
    return;
  }
  list.innerHTML = shown.map(l => `
    <div class="log-item">
      <div class="log-time">${utils.fmtTime(l.created_at)}</div>
      <div class="log-msg">
        <span class="log-level-${l.level}">[${l.level.toUpperCase()}]</span> ${l.message}
        ${l.details ? `<div style="margin-top:4px;font-size:0.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace;">${JSON.stringify(l.details)}</div>` : ''}
      </div>
    </div>`).join('');
}

document.getElementById('level-filter').addEventListener('change', renderLogs);
loadLogs();
</script>
</body>
</html>
